<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta — Leitor QR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/index.html" class="btn-back">
        <i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar
      </a>
      <div class="auth-header">
        <div class="auth-icon"><i class="ti ti-user-plus" aria-hidden="true"></i></div>
        <h1>Criar conta</h1>
        <p>Cadastre-se para começar a registrar suas compras</p>
      </div>

      <div id="form-alert"></div>

      <form id="form-cadastro" novalidate>
        <div class="field">
          <label for="input-nome">Nome</label>
          <input
            type="text"
            id="input-nome"
            placeholder="Seu nome completo"
            autocomplete="name"
            required
          />
        </div>

        <div class="field">
          <label for="input-email">E-mail</label>
          <input
            type="email"
            id="input-email"
            placeholder="voce@exemplo.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label for="input-senha">Senha</label>
          <div class="password-row">
            <input
              type="password"
              id="input-senha"
              placeholder="Mínimo de 6 caracteres"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              id="btn-toggle-senha"
              aria-label="Mostrar senha"
            >
              <i class="ti ti-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="input-confirmar-senha">Confirmar senha</label>
          <div class="password-row">
            <input
              type="password"
              id="input-confirmar-senha"
              placeholder="Repita a senha"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              id="btn-toggle-confirmar-senha"
              aria-label="Mostrar senha"
            >
              <i class="ti ti-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn primary full" id="btn-cadastrar">
          <i class="ti ti-user-plus" aria-hidden="true"></i> Criar conta
        </button>
      </form>

      <p class="auth-switch">Já tem conta? <a href="/login.html">Entrar</a></p>
    </div>
  </div>

  <script src="/auth-client.js"></script>
  <script>
    if (getToken()) {
      window.location.href = '/index.html';
    }

    setupPasswordToggle('btn-toggle-senha', 'input-senha');
    setupPasswordToggle('btn-toggle-confirmar-senha', 'input-confirmar-senha');

    const form = document.getElementById('form-cadastro');
    const alertBox = document.getElementById('form-alert');
    const btnCadastrar = document.getElementById('btn-cadastrar');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      alertBox.innerHTML = '';

      const nome = document.getElementById('input-nome').value.trim();
      const email = document.getElementById('input-email').value.trim();
      const senha = document.getElementById('input-senha').value;
      const confirmarSenha = document.getElementById('input-confirmar-senha').value;

      if (nome.length < 2) {
        alertBox.innerHTML = alertHtml('Informe seu nome completo.');
        return;
      }
      if (senha.length < 6) {
        alertBox.innerHTML = alertHtml('A senha deve ter ao menos 6 caracteres.');
        return;
      }
      if (senha !== confirmarSenha) {
        alertBox.innerHTML = alertHtml('As senhas não coincidem.');
        return;
      }

      btnCadastrar.disabled = true;
      btnCadastrar.innerHTML = '<div class="spinner"></div> Criando conta...';

      try {
        const data = await apiPost('/cadastro', { nome, email, senha });
        salvarSessao(data.token, data.usuario);
        window.location.href = '/index.html';
      } catch (err) {
        alertBox.innerHTML = alertHtml(err.message);
        btnCadastrar.disabled = false;
        btnCadastrar.innerHTML = '<i class="ti ti-user-plus" aria-hidden="true"></i> Criar conta';
      }
    });
  </script>
</body>
</html>
